<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>工作记录 — Open Growth Intel</title>
<link rel="icon" href="data:,">
<script>document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark'));</script>
<style>
:root{--bg:#050b07;--bg-grid:rgba(142,211,32,.045);--panel:#0b140e;--panel-2:#0f1b13;--panel-3:#111f16;--line:#213124;--line-soft:#17231a;--text:#dce6d7;--muted:#788574;--faint:#4d5a4b;--green:#9bdc2a;--green-soft:rgba(155,220,42,.14);--create:#39b7c8;--amber:#e6a72a;--red:#ef6f6c;--violet:#a98cf7;--shadow:0 18px 60px rgba(0,0,0,.32)}
[data-theme="light"]{--bg:#ffffff;--bg-grid:rgba(26,127,55,.025);--panel:#f6f8fa;--panel-2:#eaeef2;--panel-3:#dde3ea;--line:#d0d7de;--line-soft:#eaeef2;--text:#1f2328;--muted:#656d76;--faint:#818c98;--green:#1a7f37;--green-soft:rgba(26,127,55,.1);--create:#0969da;--amber:#b45309;--red:#cf222e;--violet:#8250df;--shadow:0 1px 3px rgba(31,35,40,.12),0 8px 24px rgba(66,74,83,.08);}
[data-theme="light"] body{background:var(--bg);}
[data-theme="light"] body::before{opacity:.1;}
[data-theme="light"] .header h1{color:var(--text);text-shadow:none;}
[data-theme="light"] .panel{background:var(--panel);border-color:var(--line);}
[data-theme="light"] .field input,[data-theme="light"] .field select{background:var(--bg);color:var(--text);border-color:var(--line);}
[data-theme="light"] .record-item{background:var(--bg);border-color:var(--line-soft);}
[data-theme="light"] .record-item:hover{background:var(--panel);border-color:var(--line);box-shadow:0 4px 16px rgba(31,35,40,.08);}
[data-theme="light"] .record-item[open]{background:var(--panel);border-color:rgba(26,127,55,.3);box-shadow:0 0 0 1px rgba(26,127,55,.12),0 8px 24px rgba(31,35,40,.08);}
[data-theme="light"] .record-item[open] summary{background:rgba(26,127,55,.04);}
[data-theme="light"] .record-body{background:var(--panel);border-top-color:var(--line-soft);}
[data-theme="light"] .detail-row{background:var(--bg);border-color:var(--line-soft);}
[data-theme="light"] .detail-label{background:var(--panel);}
[data-theme="light"] .record-title h3{color:var(--text);}
[data-theme="light"] .detail-value{color:var(--text);}
[data-theme="light"] .record-desc{color:var(--muted);}
[data-theme="light"] .record-item::before{border-color:var(--bg);}
[data-theme="light"] .empty-state{background:var(--panel);border-color:var(--line);}
[data-theme="light"] .date-line::before{background:rgba(26,127,55,.3);}
#theme-toggle{background:none;border:1px solid var(--line);color:var(--muted);cursor:pointer;border-radius:6px;padding:2px 9px;font-size:13px;font-family:inherit;transition:all .12s;margin-left:12px;flex-shrink:0;align-self:center;}
#theme-toggle:hover{border-color:var(--green);color:var(--green);}
*{box-sizing:border-box;margin:0;padding:0}
html{background:var(--bg);overscroll-behavior:none;}
body{background:radial-gradient(circle at 18% -10%,rgba(155,220,42,.09),transparent 32%),linear-gradient(180deg,#07100a 0%,var(--bg) 38%,#030604 100%);color:var(--text);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,'PingFang SC',monospace;min-height:100vh;padding:34px 24px 48px;font-size:14px;line-height:1.65;}
body::before{content:"";position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(var(--bg-grid) 1px,transparent 1px),linear-gradient(90deg,var(--bg-grid) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(180deg,rgba(0,0,0,.8),rgba(0,0,0,.18));}
a{color:var(--green);text-decoration:none;}a:hover{text-decoration:underline;text-underline-offset:3px;opacity:.9;}
.topbar,.header,.panel,.timeline-wrap{position:relative;z-index:1;width:100%;margin-left:auto;margin-right:auto;}
.topbar{font-size:.72rem;color:var(--faint);margin-bottom:24px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.04em;}
.topbar a{color:var(--faint);}.topbar a:hover{color:var(--green);}
.sep{color:var(--line);}
.header{display:grid;grid-template-columns:minmax(320px,1fr) minmax(560px,auto);gap:28px;align-items:start;margin-bottom:22px;}
.header h1{font-size:2.05rem;font-weight:900;letter-spacing:0;margin-bottom:8px;color:#eef8e8;text-shadow:0 0 26px rgba(155,220,42,.16);}
.sub{display:none;}
.nav-links{display:flex;flex-wrap:wrap;gap:0;justify-content:flex-end;align-self:start;margin-top:-48px;padding:0 0 12px;background:linear-gradient(90deg,transparent,rgba(155,220,42,.035) 42%,rgba(155,220,42,.018) 74%,transparent);border-bottom:1px solid rgba(155,220,42,.18);}
.nav-links::before{content:"NAV";align-self:center;margin-right:18px;color:#53624f;font-size:.58rem;font-weight:900;letter-spacing:.16em;}
.nav-links a{position:relative;display:inline-flex;align-items:center;min-height:28px;padding:0 16px;color:#84917d;font-size:.74rem;font-weight:850;white-space:nowrap;letter-spacing:.02em;transition:color .14s,text-shadow .14s;}
.nav-links a + a{border-left:1px solid rgba(155,220,42,.13);}
.nav-links a::before{content:"";position:absolute;left:16px;right:16px;bottom:-13px;height:1px;background:transparent;transition:background .14s,box-shadow .14s,height .14s;}
.nav-links a::after{content:"";position:absolute;left:16px;bottom:-15px;width:5px;height:5px;border-radius:999px;background:rgba(155,220,42,0);transition:background .14s,box-shadow .14s;}
.nav-links a:hover{color:#e6f1df;text-decoration:none;opacity:1;text-shadow:0 0 10px rgba(155,220,42,.16);}
.nav-links a:hover::before{background:rgba(155,220,42,.28);}
.nav-links a.current{color:var(--green);font-weight:950;text-shadow:0 0 14px rgba(155,220,42,.26);}
.nav-links a.current::before{height:2px;background:var(--green);box-shadow:0 0 16px rgba(155,220,42,.7);}
.nav-links a.current::after{background:var(--green);box-shadow:0 0 12px rgba(155,220,42,.72);}
.panel{background:linear-gradient(180deg,rgba(15,27,19,.96),rgba(8,15,10,.96));border:1px solid var(--line);box-shadow:var(--shadow);}
.toolbar{display:grid;grid-template-columns:1fr;gap:10px;padding:12px;margin-bottom:28px;}
.toolbar .field:nth-child(n+2){display:none;}
.field{display:flex;flex-direction:column;gap:6px;}
.field label{font-size:.62rem;text-transform:uppercase;letter-spacing:.1em;color:var(--faint);font-weight:900;}
.field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:6px;background:#08100b;color:var(--text);font:inherit;font-size:.78rem;min-height:40px;}
.field input{font-size:.86rem;background:linear-gradient(90deg,#071009,#0c1710);}
.field input::placeholder{color:#52604f;}
.field input:focus,.field select:focus{outline:2px solid rgba(155,220,42,.2);outline-offset:1px;border-color:rgba(155,220,42,.62);box-shadow:0 0 0 3px rgba(155,220,42,.08);}
.timeline-wrap{padding:2px 0 0;}
.month-block{margin-bottom:34px;}
.month-header{display:flex;align-items:end;justify-content:space-between;gap:16px;margin-bottom:16px;padding:0 0 10px;border-bottom:1px solid var(--line);}
.month-header h2{font-size:1.45rem;letter-spacing:0;color:#edf6e8;font-weight:900;}
.month-header .meta{font-size:.72rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;}
.date-block{display:grid;grid-template-columns:150px 1fr;gap:22px;margin-bottom:18px;align-items:start;}
.date-aside{position:sticky;top:86px;padding:10px 0 0;}
.date-day{font-size:.84rem;font-weight:900;color:#dbe8d4;}
.date-week{font-size:.72rem;color:var(--faint);text-transform:uppercase;letter-spacing:.08em;}
.date-line{position:relative;min-width:0;}
.date-line::before{content:"";position:absolute;left:17px;top:2px;bottom:-18px;width:1px;background:linear-gradient(180deg,rgba(155,220,42,.42),rgba(33,49,36,.12));}
.record-list{display:grid;gap:11px;min-width:0;}
.record-item{position:relative;min-width:0;background:linear-gradient(180deg,rgba(13,24,17,.98),rgba(9,17,12,.98));border:1px solid var(--line-soft);border-left:3px solid var(--green);border-radius:7px;overflow:visible;box-shadow:0 10px 30px rgba(0,0,0,.18);transition:border-color .16s ease,box-shadow .16s ease,background .16s ease,transform .16s ease;}
.record-item:hover{transform:translateY(-1px);border-color:#304332;box-shadow:0 16px 40px rgba(0,0,0,.28);}
.record-item::before{content:"";position:absolute;left:-29px;top:23px;width:11px;height:11px;border-radius:999px;border:3px solid var(--bg);background:var(--green);box-shadow:0 0 0 1px rgba(155,220,42,.45),0 0 14px rgba(155,220,42,.25);}
.record-item.create{border-left-color:var(--create);}
.record-item.update{border-left-color:var(--amber);}
.record-item.delete{border-left-color:var(--red);}
.record-item.confirm{border-left-color:var(--violet);}
.record-item.create::before{background:var(--create);box-shadow:0 0 0 1px rgba(57,183,200,.45),0 0 14px rgba(57,183,200,.24);}
.record-item.update::before{background:var(--amber);box-shadow:0 0 0 1px rgba(230,167,42,.45),0 0 14px rgba(230,167,42,.25);}
.record-item.delete::before{background:var(--red);box-shadow:0 0 0 1px rgba(239,111,108,.45),0 0 14px rgba(239,111,108,.22);}
.record-item.confirm::before{background:var(--violet);box-shadow:0 0 0 1px rgba(169,140,247,.45),0 0 14px rgba(169,140,247,.22);}
.record-item summary{list-style:none;cursor:pointer;padding:15px 16px 14px;}
.record-item summary::-webkit-details-marker{display:none;}
.record-item[open]{border-color:rgba(155,220,42,.52);box-shadow:0 0 0 1px rgba(155,220,42,.15),0 22px 70px rgba(0,0,0,.34),inset 0 1px 0 rgba(230,248,210,.05);background:linear-gradient(180deg,#102016 0%,#0b1510 100%);}
.record-item[open] summary{background:linear-gradient(90deg,rgba(155,220,42,.08),transparent 60%);}
.record-item[open] .record-desc{-webkit-line-clamp:unset;}
.record-top{display:flex;align-items:flex-start;justify-content:space-between;gap:14px;}
.record-main{min-width:0;}
.record-title{display:flex;gap:9px;align-items:flex-start;margin-bottom:8px;}
.record-title h3{font-size:.98rem;line-height:1.45;color:#eef8e8;font-weight:900;overflow-wrap:anywhere;}
.record-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:8px;}
.entity-tag,.time-tag,.id-tag{font-size:.68rem;color:var(--faint);text-transform:uppercase;letter-spacing:.06em;}
.entity-tag{color:#94a58c;}
.id-tag{color:#b5c7aa;background:transparent;border:0;font:inherit;padding:0;cursor:pointer;}
.id-tag:hover{color:var(--green);text-decoration:underline;text-underline-offset:3px;}
.id-tag.copied{color:var(--green);}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:.66rem;font-weight:900;border:1px solid transparent;white-space:nowrap;letter-spacing:.04em;}
.pill.create{background:rgba(57,183,200,.09);color:var(--create);border-color:rgba(57,183,200,.3);}
.pill.update{background:rgba(230,167,42,.09);color:var(--amber);border-color:rgba(230,167,42,.28);}
.pill.delete{background:rgba(239,111,108,.09);color:var(--red);border-color:rgba(239,111,108,.28);}
.pill.confirm{background:rgba(169,140,247,.09);color:var(--violet);border-color:rgba(169,140,247,.28);}
.record-time{font-size:.72rem;color:var(--faint);white-space:nowrap;padding-top:2px;}
.record-desc{color:#94a58c;font-size:.8rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;overflow-wrap:anywhere;}
.open-cue{flex:0 0 auto;color:var(--faint);font-size:1rem;line-height:1;transition:transform .16s,color .16s;padding-top:3px;}
.record-item[open] .open-cue{transform:rotate(90deg);color:var(--green);}
.record-body{padding:0 16px 16px;border-top:1px solid rgba(155,220,42,.14);background:linear-gradient(180deg,rgba(8,15,10,.2),rgba(8,15,10,.82));}
.detail-stack{display:grid;gap:10px;padding-top:14px;}
.detail-row{display:grid;grid-template-columns:150px minmax(0,1fr);border:1px solid var(--line-soft);border-radius:7px;background:rgba(17,31,22,.7);overflow:hidden;}
.detail-label{padding:13px 14px;border-right:1px solid var(--line-soft);font-size:.72rem;color:var(--faint);font-weight:900;background:rgba(5,11,7,.52);}
.detail-value{padding:13px 16px;font-size:.86rem;color:#d8e4d1;}
.impact-list{display:grid;gap:6px;}
.impact-item{display:flex;flex-wrap:wrap;gap:8px;align-items:baseline;}
.impact-list a{word-break:break-all;color:#a8b89a;}
.impact-list a:hover{color:#d8e8cc;}
.impact-note{color:var(--faint);font-size:.74rem;}
.empty-state{padding:44px 18px;text-align:center;color:var(--faint);border:1px dashed var(--line);border-radius:7px;background:rgba(11,20,14,.75);width:100%;margin:0 auto;}
@media(max-width:980px){body{padding:24px 14px 36px;}.header{grid-template-columns:1fr;}.nav-links{justify-content:flex-start;margin-top:0;}.toolbar{grid-template-columns:1fr;}.date-block{grid-template-columns:1fr;gap:10px;}.date-aside{position:relative;top:auto;display:flex;gap:10px;align-items:baseline;}.date-line{padding-left:24px;}.date-line::before{left:5px;}.record-item::before{left:-24px;}.detail-row{grid-template-columns:1fr;}.detail-label{border-right:0;border-bottom:1px solid var(--line-soft);}}
</style>
</head>
<body>
<div class="topbar">
    <a href="index.html">Open Growth Intel</a>
    <span class="sep">/</span>
    <span>工作记录</span>
  </div>

  <div class="header">
    <div>
      <h1>工作记录</h1>
      <div class="sub">当前页展示项目工作记录。每条记录按业务实体的一次有意义变更整理。</div>
    </div>
    <nav class="nav-links">
      <a href="index.html">总览</a>
      <a href="worklog.html" class="current">工作记录</a>
      <a href="maintenance.html">维护说明</a>
      <button id="theme-toggle" onclick="toggleTheme()" title="切换亮/暗色">☀</button>
    </nav>
  </div>

  <section class="panel toolbar">
    <div class="field">
      <label for="search-input">搜索</label>
      <input id="search-input" type="search" placeholder="搜名称、结论、TODO、Hack、目的、影响路径">
    </div>
    <div class="field">
      <label for="entity-filter">实体分类</label>
      <select id="entity-filter">
        <option value="">全部实体</option>
      </select>
    </div>
    <div class="field">
      <label for="action-filter">动作</label>
      <select id="action-filter">
        <option value="">全部动作</option>
        <option value="create">创建</option>
        <option value="update">更新</option>
        <option value="delete">删除</option>
        <option value="confirm">确认</option>
      </select>
    </div>
  </section>

  <div class="timeline-wrap" id="timeline"></div>

<script>
var DATA = {
  sources: [],
  /*
   * 工作记录字段规范：
   * - id: 唯一记录编号，建议格式 WL-业务缩写日期/序号。
   * - time: 记录日期，格式 YYYY-MM-DD。
   * - action: 动作类型，仅用 create / update / delete / confirm。
   * - entity: 业务实体分类，用于筛选聚合。
   * - name: 动作 + 对象 + 版本/范围，作为卡片标题。
   * - description: 一句话摘要，只写本次做了什么，不写长过程。
   * - purpose: 为什么做，解决什么业务问题。
   * - include: 本次实际包含的工作范围。
   * - exclude: 本次明确不包含的边界。
   * - conclusion: 本次产出的核心判断、结果或发现。
   * - todo: 下一步待办，必须可执行；没有就留空字符串。
   * - hack: 临时处理、绕过方案、已知遗漏或风险；没有就留空字符串。
   * - impact: 影响文件/目录/页面入口。
   * - search: 补充搜索关键词。
   */
  records: [
    {
      id: 'WL-OGI-INIT-0629',
      time: '2026-06-29',
      action: 'create',
      entity: '项目初始化',
      name: '创建-open-growth-intel 项目骨架',
      description: '从原海外增长项目中迁移可公开、可复用的能力骨架，建立新的开源项目目录结构。',
      purpose: '将增长/SEO/竞品情报能力抽象为个人可维护的开源资产，作为面试作品集。',
      include: '创建 cli/、skills/、templates/、site/、examples/、docs/、tests/ 目录；迁移 site 三页与主题系统。',
      exclude: '不迁移原始数据、付费工具导出、真实竞品报告、内部财务/品牌信息。',
      conclusion: '项目骨架已建立，所有示例数据均已替换为 mock。',
      todo: '继续迁移 CLI、模板、示例配置与文档。',
      hack: '',
      impact: [
        { path: 'site/index.html', note: '新建：项目总览页' },
        { path: 'site/worklog.html', note: '新建：工作记录页' },
        { path: 'site/maintenance.html', note: '新建：维护说明页' },
        { path: 'site/assets/css/main.css', note: '新建：设计系统 CSS' },
        { path: 'site/assets/js/theme.js', note: '新建：亮暗主题切换 JS' }
      ],
      search: 'open-growth-intel 迁移 项目骨架 目录结构 site 工作记录'
    }
  ]
};

var timelineEl = document.getElementById('timeline');
var searchInput = document.getElementById('search-input');
var entityFilter = document.getElementById('entity-filter');
var actionFilter = document.getElementById('action-filter');

function escapeHtml(text) {
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function valueOrDash(text) {
  return text ? escapeHtml(text) : '-';
}

function normalizeImpact(item) {
  if (item && typeof item === 'object') {
    return {
      path: item.path || '',
      note: item.note || ''
    };
  }
  var raw = String(item || '');
  var match = raw.match(/^(.*?)(（[^（）]+）)$/);
  return {
    path: match ? match[1] : raw,
    note: match ? match[2].slice(1, -1) : ''
  };
}

function recordTodo(record) {
  return record.todo || record.todoHack || '';
}

function recordHack(record) {
  return record.hack || '';
}

function toFileHref(path) {
  if (!path) return '';
  return encodeURI(path).replace(/#/g, '%23');
}

function actionLabel(action) {
  return {
    create: '创建',
    update: '更新',
    delete: '删除',
    confirm: '确认'
  }[action] || action;
}

function weekday(dateStr) {
  var labels = ['周日','周一','周二','周三','周四','周五','周六'];
  var parts = dateStr.split('-').map(Number);
  return labels[new Date(parts[0], parts[1] - 1, parts[2]).getDay()];
}

function uniqueEntities(records) {
  var map = {};
  records.forEach(function(item) { map[item.entity] = true; });
  return Object.keys(map);
}

function fillEntityFilter() {
  uniqueEntities(DATA.records).sort().forEach(function(entity) {
    var option = document.createElement('option');
    option.value = entity;
    option.textContent = entity;
    entityFilter.appendChild(option);
  });
}

function groupedRecords(records) {
  var months = {};
  records.forEach(function(record) {
    var month = record.time.slice(0, 7);
    if (!months[month]) months[month] = {};
    if (!months[month][record.time]) months[month][record.time] = [];
    months[month][record.time].push(record);
  });
  return months;
}

function recordMatches(record) {
  var q = (searchInput.value || '').trim().toLowerCase();
  var entity = entityFilter.value;
  var action = actionFilter.value;
  var impactText = (record.impact || []).map(function(item) {
    var impact = normalizeImpact(item);
    return [impact.path, impact.note].join(' ');
  }).join(' ');
  var text = [
    record.name,
    record.id,
    record.description,
    record.purpose,
    record.include,
    record.exclude,
    record.conclusion,
    recordTodo(record),
    recordHack(record),
    record.entity,
    record.search,
    impactText
  ].join(' ').toLowerCase();
  return (!q || text.indexOf(q) !== -1) &&
    (!entity || record.entity === entity) &&
    (!action || record.action === action);
}

function renderTimeline() {
  var filtered = DATA.records.filter(recordMatches);
  if (!filtered.length) {
    timelineEl.innerHTML = '<div class="empty-state">当前筛选条件下没有匹配记录。</div>';
    return;
  }

  var grouped = groupedRecords(filtered);
  var monthKeys = Object.keys(grouped).sort().reverse();

  timelineEl.innerHTML = monthKeys.map(function(month) {
    var dateKeys = Object.keys(grouped[month]).sort().reverse();
    var total = dateKeys.reduce(function(sum, key) { return sum + grouped[month][key].length; }, 0);

    return (
      '<section class="month-block">' +
        '<div class="month-header">' +
          '<h2>' + month + '</h2>' +
          '<div class="meta">' + total + ' 条记录</div>' +
        '</div>' +
        dateKeys.map(function(dateKey) {
          return (
            '<div class="date-block">' +
              '<div class="date-aside">' +
                '<div class="date-day">' + dateKey + '</div>' +
                '<div class="date-week">' + weekday(dateKey) + '</div>' +
              '</div>' +
              '<div class="date-line">' +
                '<div class="record-list">' +
                  grouped[month][dateKey].map(function(record) {
                    var impactHtml = (record.impact || []).map(function(item) {
                      var impact = normalizeImpact(item);
                      var href = toFileHref(impact.path);
                      var pathHtml = href
                        ? '<a href="' + href + '" target="_blank" rel="noopener noreferrer">' + escapeHtml(impact.path) + '</a>'
                        : escapeHtml(impact.path);
                      var noteHtml = impact.note ? '<span class="impact-note">(' + escapeHtml(impact.note) + ')</span>' : '';
                      return '<div class="impact-item">' + pathHtml + noteHtml + '</div>';
                    }).join('');
                    var detailsHtml =
                      '<div class="detail-row"><div class="detail-label">记录ID</div><div class="detail-value"><button type="button" class="id-tag copy-id" data-id="' + escapeHtml(record.id) + '">ID: ' + escapeHtml(record.id) + '</button></div></div>' +
                      '<div class="detail-row"><div class="detail-label">目的</div><div class="detail-value">' + valueOrDash(record.purpose) + '</div></div>' +
                      '<div class="detail-row"><div class="detail-label">范围-包括</div><div class="detail-value">' + valueOrDash(record.include) + '</div></div>' +
                      '<div class="detail-row"><div class="detail-label">范围-不包括</div><div class="detail-value">' + valueOrDash(record.exclude) + '</div></div>' +
                      '<div class="detail-row"><div class="detail-label">结论</div><div class="detail-value">' + valueOrDash(record.conclusion) + '</div></div>' +
                      '<div class="detail-row"><div class="detail-label">TODO</div><div class="detail-value">' + valueOrDash(recordTodo(record)) + '</div></div>' +
                      '<div class="detail-row"><div class="detail-label">Hack</div><div class="detail-value">' + valueOrDash(recordHack(record)) + '</div></div>' +
                      '<div class="detail-row"><div class="detail-label">影响</div><div class="detail-value impact-list">' + impactHtml + '</div></div>';

                    return (
                      '<details class="record-item ' + record.action + '">' +
                        '<summary>' +
                          '<div class="record-top">' +
                            '<div class="record-main">' +
                              '<div class="record-title">' +
                                '<span class="pill ' + record.action + '">' + actionLabel(record.action) + '</span>' +
                                '<h3>' + escapeHtml(record.name) + '</h3>' +
                              '</div>' +
                              '<div class="record-meta">' +
                                '<button type="button" class="id-tag copy-id" data-id="' + escapeHtml(record.id) + '">ID: ' + escapeHtml(record.id) + '</button>' +
                                '<span class="entity-tag">' + escapeHtml(record.entity) + '</span>' +
                                '<span class="time-tag">' + escapeHtml(record.time) + '</span>' +
                              '</div>' +
                              '<div class="record-desc">' + escapeHtml(record.description) + '</div>' +
                            '</div>' +
                            '<div class="open-cue">›</div>' +
                          '</div>' +
                        '</summary>' +
                        '<div class="record-body">' +
                            '<div class="detail-stack">' +
                            detailsHtml +
                          '</div>' +
                        '</div>' +
                      '</details>'
                    );
                  }).join('') +
                '</div>' +
              '</div>' +
            '</div>'
          );
        }).join('') +
      '</section>'
    );
  }).join('');
}

function fallbackCopy(text) {
  var input = document.createElement('input');
  input.value = text;
  input.setAttribute('readonly', '');
  input.style.position = 'fixed';
  input.style.left = '-9999px';
  document.body.appendChild(input);
  input.select();
  var ok = false;
  try {
    ok = document.execCommand('copy');
  } catch (err) {
    ok = false;
  }
  document.body.removeChild(input);
  return ok;
}

function markCopied(button, ok) {
  var original = button.textContent;
  button.classList.add('copied');
  button.textContent = ok ? '已复制' : original;
  window.setTimeout(function() {
    button.classList.remove('copied');
    button.textContent = original;
  }, 900);
}

function copyRecordId(button) {
  var id = button.dataset.id || '';
  if (!id) return;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(id).then(function() {
      markCopied(button, true);
    }).catch(function() {
      markCopied(button, fallbackCopy(id));
    });
    return;
  }
  markCopied(button, fallbackCopy(id));
}

fillEntityFilter();
renderTimeline();

searchInput.addEventListener('input', renderTimeline);
entityFilter.addEventListener('change', renderTimeline);
actionFilter.addEventListener('change', renderTimeline);
timelineEl.addEventListener('click', function(event) {
  var button = event.target.closest('.copy-id');
  if (!button) return;
  event.preventDefault();
  event.stopPropagation();
  copyRecordId(button);
});
</script>
